<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
    <!-- Определяем градиент как на кнопке "Твой гороскоп" -->
    <defs>
        <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c026d3" /> <!-- fuchsia-600 -->
            <stop offset="100%" stop-color="#4338ca" /> <!-- indigo-700 -->
        </linearGradient>
    </defs>

    <!-- Идеальный круг с твоим фирменным градиентом -->
    <circle cx="256" cy="256" r="240" fill="url(#brandGradient)" />

    <!-- Опционально: легкий внутренний блик для объема (можно удалить) -->
    <circle cx="256" cy="256" r="240" fill="white" fill-opacity="0.05" />
</svg>